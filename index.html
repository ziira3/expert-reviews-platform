<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Trade - Oliver Reijke</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0b0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: #141b2b;
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a3450;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0b34b, #ff7e5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .user-icon {
            background: #1f2a44;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #88b0ff;
        }

        .account-info {
            background: #1a2337;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #27304a;
        }

        .account-info .account-name {
            font-size: 14px;
            color: #8892b0;
            margin-bottom: 4px;
        }

        .account-info .account-number {
            font-size: 16px;
            font-weight: 600;
            color: #e0e6f0;
            letter-spacing: 1px;
        }

        .account-info .account-type {
            display: inline-block;
            background: #1f4a3a;
            color: #64ff9e;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .balance-card {
            background: linear-gradient(145deg, #1a2337, #0f1629);
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid #2a3450;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(240, 179, 75, 0.05), transparent 70%);
            border-radius: 50%;
        }

        .balance-card .balance-label {
            font-size: 13px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .balance-card .balance-amount {
            font-size: 42px;
            font-weight: 700;
            color: #64ff9e;
            margin: 4px 0 6px;
            font-family: 'Courier New', monospace;
            position: relative;
            z-index: 1;
        }

        .balance-card .balance-usd {
            font-size: 16px;
            color: #8892b0;
            position: relative;
            z-index: 1;
        }

        .balance-card .balance-status {
            display: inline-block;
            background: #5c2a2a;
            color: #ff6b6b;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            animation: pulse-status 2s infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .balance-card .balance-status.active {
            background: #1f4a3a;
            color: #64ff9e;
            animation: none;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-row .btn {
            padding: 14px 10px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .btn-row .btn-trade {
            background: linear-gradient(135deg, #f0b34b, #e8903a);
            color: #0b0e1a;
        }

        .btn-row .btn-trade:hover {
            transform: scale(1.02);
        }

        .btn-row .btn-deposit {
            background: linear-gradient(135deg, #1f4a3a, #2a5f4a);
            color: #64ff9e;
        }

        .btn-row .btn-deposit:hover {
            transform: scale(1.02);
        }

        .btn-row .btn-withdraw {
            background: linear-gradient(135deg, #5c2a2a, #7a3535);
            color: #ff6b6b;
        }

        .btn-row .btn-withdraw:hover {
            transform: scale(1.02);
        }

        .details-card {
            background: #1a2337;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #27304a;
            margin-bottom: 16px;
        }

        .details-card .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e2740;
            font-size: 14px;
        }

        .details-card .detail-row:last-child {
            border-bottom: none;
        }

        .details-card .detail-row .label {
            color: #8892b0;
        }

        .details-card .detail-row .value {
            color: #e0e6f0;
            font-weight: 600;
        }

        .details-card .detail-row .value.green {
            color: #64ff9e;
        }

        .details-card .detail-row .value.gold {
            color: #f0b34b;
        }

        .details-card .detail-row .value.red {
            color: #ff6b6b;
        }

        .details-card .detail-row .value.blue {
            color: #88b0ff;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: #0b0e1a;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tabs .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #8892b0;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tabs .tab.active {
            background: #1f2a44;
            color: #e0e6f0;
        }

        .tabs .tab:hover {
            background: #1f2a44;
            color: #e0e6f0;
        }

        .empty-state {
            text-align: center;
            padding: 30px 0;
            color: #8892b0;
        }

        .empty-state i {
            font-size: 48px;
            color: #2a3a5c;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .footer {
            text-align: center;
            color: #4a5577;
            font-size: 11px;
            margin-top: 16px;
            border-top: 1px solid #1e2740;
            padding-top: 16px;
        }

        .nl-flag-small {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #8892b0;
        }

        .nl-flag-small .flag-dot {
            display: inline-block;
            width: 18px;
            height: 12px;
            border-radius: 2px;
            background: linear-gradient(180deg, #AE1C28 33%, #FFFFFF 33%, #FFFFFF 66%, #21468B 66%);
            flex-shrink: 0;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #141b2b;
            border-radius: 24px;
            padding: 30px;
            max-width: 440px;
            width: 100%;
            border: 1px solid #2a3450;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box .close-modal {
            float: right;
            background: none;
            border: none;
            color: #8892b0;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-box .close-modal:hover {
            color: white;
        }

        .modal-box .modal-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        .modal-box .modal-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-box .modal-sub {
            text-align: center;
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .deposit-modal .modal-icon {
            color: #64ff9e;
        }
        .deposit-modal .modal-title {
            color: #64ff9e;
        }

        .deposit-modal .wallet-box {
            background: #0b0e1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a3450;
            margin-bottom: 16px;
        }

        .deposit-modal .wallet-box .wallet-label {
            font-size: 12px;
            color: #8892b0;
            margin-bottom: 6px;
        }

        .deposit-modal .wallet-box .wallet-address {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #88b0ff;
            word-break: break-all;
            background: #0b0e1a;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #1e2740;
            text-align: center;
            font-weight: 700;
        }

        .deposit-modal .wallet-box .copy-btn {
            background: #2a3a5c;
            color: #88b0ff;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
        }

        .deposit-modal .wallet-box .copy-btn:hover {
            background: #3e4b6b;
        }

        .deposit-modal .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #1a2337;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a3450;
            margin-bottom: 16px;
        }

        .deposit-modal .info-grid .info-item {
            text-align: center;
        }

        .deposit-modal .info-grid .info-item .info-label {
            font-size: 10px;
            color: #8892b0;
            text-transform: uppercase;
        }

        .deposit-modal .info-grid .info-item .info-value {
            font-size: 14px;
            font-weight: 700;
            margin-top: 2px;
        }

        .deposit-modal .btn-cs-deposit {
            background: #075e54;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            text-align: center;
            display: block;
            width: 100%;
        }

        .deposit-modal .btn-cs-deposit:hover {
            background: #0a7a6e;
        }

        .withdraw-modal .modal-icon {
            color: #ff6b6b;
        }
        .withdraw-modal .modal-title {
            color: #ff6b6b;
        }

        .withdraw-modal .info-box {
            background: #0b0e1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a3450;
            margin-bottom: 16px;
        }

        .withdraw-modal .info-box .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }

        .withdraw-modal .info-box .info-row .label {
            color: #8892b0;
        }
        .withdraw-modal .info-box .info-row .value {
            font-weight: 600;
            color: #e0e6f0;
        }

        .withdraw-modal .info-box .info-row .value.red {
            color: #ff6b6b;
        }
        .withdraw-modal .info-box .info-row .value.green {
            color: #64ff9e;
        }
        .withdraw-modal .info-box .info-row .value.gold {
            color: #f0b34b;
        }

        .withdraw-modal .btn-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .withdraw-modal .btn-cs {
            background: #075e54;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .withdraw-modal .btn-cs:hover {
            background: #0a7a6e;
        }

        .withdraw-modal .btn-deposit-modal {
            background: linear-gradient(135deg, #f0b34b, #e8903a);
            color: #0b0e1a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .withdraw-modal .btn-deposit-modal:hover {
            transform: scale(1.02);
        }

        .number-display {
            font-size: 48px;
            font-weight: 700;
            color: #f0b34b;
            text-align: center;
            padding: 10px 0;
        }

        /* WHATSAPP FLOATING BUTTON */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            text-decoration: none;
            z-index: 999;
            transition: 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        /* WHATSAPP BUTTON - FULL WIDTH */
        .btn-whatsapp-full {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: #075e54;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: 8px;
        }

        .btn-whatsapp-full:hover {
            background: #0a7a6e;
            transform: scale(1.02);
        }

        .btn-whatsapp-full i {
            margin-right: 10px;
        }

        /* UNLOCK BUTTON */
        .btn-unlock {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #f0b34b, #e8903a);
            color: #0b0e1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }

        .btn-unlock:hover {
            transform: scale(1.02);
        }

        .btn-unlock i {
            margin-right: 10px;
        }
    </style>
</head>
